<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VOGIL - Insights Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f7fa;
      padding: 20px;
      direction: rtl;
    }

    .container {
      max-width: 1600px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 40px 20px;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }

    header h1 { font-size: 2.8em; margin-bottom: 10px; }
    header p { font-size: 1.1em; opacity: 0.9; }

    .back-link {
      display: inline-block;
      margin-bottom: 20px;
      padding: 10px 20px;
      background: white;
      color: #667eea;
      text-decoration: none;
      border-radius: 6px;
      font-weight: 600;
      transition: all 0.3s;
    }

    .back-link:hover {
      transform: translateX(5px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .modules-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(700px, 1fr));
      gap: 30px;
      margin-bottom: 40px;
    }

    .module {
      background: white;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      border-top: 5px solid #667eea;
    }

    .module.geo { border-top-color: #667eea; }
    .module.budget { border-top-color: #f093fb; }
    .module.safety { border-top-color: #fa7e5d; }
    .module.education { border-top-color: #4facfe; }
    .module.health { border-top-color: #43e97b; }
    .module.employment { border-top-color: #fa709a; }
    .module.environment { border-top-color: #30b0fe; }
    .module.energy { border-top-color: #f093fb; }

    .module h2 {
      font-size: 1.8em;
      margin-bottom: 25px;
      color: #333;
      border-bottom: 2px solid #f0f0f0;
      padding-bottom: 15px;
    }

    .insight {
      background: #f9f9f9;
      border-right: 4px solid #667eea;
      padding: 15px;
      margin-bottom: 12px;
      border-radius: 6px;
      line-height: 1.6;
      font-size: 0.95em;
    }

    .insight-num {
      display: inline-block;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      line-height: 30px;
      text-align: center;
      font-weight: bold;
      margin-left: 10px;
      font-size: 0.9em;
    }

    .insight strong {
      color: #333;
      display: block;
      margin-bottom: 5px;
    }

    .insight p {
      color: #666;
      margin-top: 5px;
    }

    footer {
      text-align: center;
      padding: 30px;
      background: #333;
      color: white;
      border-radius: 12px;
      margin-top: 40px;
    }

    @media (max-width: 768px) {
      .modules-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

    function renderInsights() {
      const html = Object.entries(insightsData).map(([key, data]) => `
        <div class="module ${data.color}">
          <h2>${data.emoji} ${data.title}</h2>
          ${data.insights.map(insight => `
            <div class="insight">
              <strong>${insight.title}</strong>
              <p>${insight.desc}</p>
              <span class="insight-num">${insight.num}</span>
            </div>
          `).join('')}
        </div>
      `).join('');

      document.getElementById('modulesContainer').innerHTML = html;
    }

    window.addEventListener('load', renderInsights);
